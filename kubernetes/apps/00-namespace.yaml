apiVersion: v1
kind: Namespace
metadata:
  name: ecommerce
  labels:
    app.kubernetes.io/managed-by: kubectl
    chaos-target: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ecommerce
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "dev"
  TRACING_ENABLED: "true"
---
# ServiceAccount for apps (used by chaos tools to identify targets)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecommerce-app
  namespace: ecommerce
---
# LimitRange — ensures all pods have resource requests/limits
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: ecommerce
spec:
  limits:
  - type: Container
    default:
      cpu: "200m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
    max:
      cpu: "1000m"
      memory: "1Gi"
---
# ResourceQuota — caps total namespace resources
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ecommerce-quota
  namespace: ecommerce
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "30"
