# ServiceMonitor tells Prometheus to scrape all pods in the ecommerce namespace
# that have the prometheus.io/scrape: "true" annotation
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ecommerce-apps
  namespace: monitoring
  labels:
    release: prometheus   # must match kube-prometheus-stack label selector
spec:
  namespaceSelector:
    matchNames:
    - ecommerce
  selector:
    matchLabels: {}   # match all services in namespace
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    honorLabels: true
---
# PrometheusRule: alert when a service has 0 ready pods
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ecommerce-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: ecommerce.availability
    interval: 30s
    rules:
    - alert: ServiceNoReadyPods
      expr: |
        kube_deployment_status_replicas_available{namespace="ecommerce"} == 0
      for: 1m
      labels:
        severity: critical
        namespace: ecommerce
      annotations:
        summary: "Service {{ $labels.deployment }} has no ready pods"
        description: "Deployment {{ $labels.deployment }} in namespace ecommerce has been down for 1 minute."

    - alert: ServiceHighErrorRate
      expr: |
        sum(rate(http_requests_total{namespace="ecommerce", status=~"5.."}[5m])) by (deployment)
        /
        sum(rate(http_requests_total{namespace="ecommerce"}[5m])) by (deployment) > 0.05
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High error rate on {{ $labels.deployment }}"

    - alert: PodRestartingFrequently
      expr: |
        increase(kube_pod_container_status_restarts_total{namespace="ecommerce"}[15m]) > 3
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is restarting frequently"
